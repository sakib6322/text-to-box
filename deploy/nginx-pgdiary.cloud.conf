# /etc/nginx/sites-available/pgdiary.cloud
# Frontend: static dist/  |  API: proxy to :8787

server {
    listen 80;
    server_name pgdiary.cloud www.pgdiary.cloud;

    # If SSL certs exist, certbot usually adds redirect; keep HTTP working during setup:
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    root /root/text-to-box/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTPS (required for pgdiary.cloud — browser uses https after redirect)
server {
    listen 443 ssl;
    server_name pgdiary.cloud www.pgdiary.cloud;

    ssl_certificate /etc/letsencrypt/live/pgdiary.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pgdiary.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /root/text-to-box/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
